  mp_prod:   `https://docs.google.com/spreadsheets/d/e/2PACX-1vQuJX1L85DXokPgEdg1GidRpB6-A188_r6HDmJltcS-l7CLFoRhhUw_g5IHy5I70qR7MiBcKV1fYvo8/pub?gid=117960059&single=true&output=csv`,

  producto:  `https://docs.google.com/spreadsheets/d/e/2PACX-1vQuJX1L85DXokPgEdg1GidRpB6-A188_r6HDmJltcS-l7CLFoRhhUw_g5IHy5I70qR7MiBcKV1fYvo8/pub?gid=1236938962&single=true&output=csv`,
  despachos: `https://docs.google.com/spreadsheets/d/e/2PACX-1vQuJX1L85DXokPgEdg1GidRpB6-A188_r6HDmJltcS-l7CLFoRhhUw_g5IHy5I70qR7MiBcKV1fYvo8/pub?gid=1044466995&single=true&output=csv`
};

let RAW = {};
let currentMes = "todos";

// ===== UTILIDADES =====
async function fetchCSV(url) {
  const res = await fetch(url);
  const text = await res.text();
  
  function parseCSVLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') {
        inQuotes = !inQuotes;
      } else if (line[i] === "," && !inQuotes) {
        result.push(current.trim());
        current = "";
      } else {
        current += line[i];
      }
    }
    result.push(current.trim());
    return result;
  }

  const lines = text.trim().split("\n");
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const values = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (values[i] || "").trim());
    return obj;
  });
}

function getMes(fechaStr) {
  if (!fechaStr) return "";
  const meses = ["enero","febrero","marzo","abril","mayo","junio",
                 "julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const partes = fechaStr.split("/");
  const mes = parseInt(partes[1]) - 1;
  return meses[mes] || "";
}

function filtrar(arr, campoFecha = "FECHA") {
  if (currentMes === "todos") return arr;
  return arr.filter(r => getMes(r[campoFecha]) === currentMes);
}

// ===== CARGA DE DATOS =====
async function cargarDatos() {
  document.body.innerHTML = `<div style="text-align:center;padding:100px;font-size:1.2rem;color:#1565c0;">⏳ Cargando datos...</div>`;
  try {
    const [resina, mp_alm, mp_prod, stock_seg, producto, despachos] = await Promise.all([
      fetchCSV(URLS.resina),
      fetchCSV(URLS.mp_alm),
      fetchCSV(URLS.mp_prod),
      fetchCSV(URLS.stock_seg),
      fetchCSV(URLS.producto),
      fetchCSV(URLS.despachos)
    ]);
    RAW = { resina, mp_alm, mp_prod, stock_seg, producto, despachos };
    iniciarDashboard();
  } catch(e) {
    document.body.innerHTML = `<div style="text-align:center;padding:100px;color:red;">❌ Error cargando datos: ${e.message}</div>`;
  }
}

// ===== NAVEGACIÓN =====
function switchPage(page, tab) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".page-tab").forEach(t => t.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");
  tab.classList.add("active");
  document.getElementById("page-subtitle").textContent = page === "mp" ? "ALMACÉN MP" : "ALMACÉN PT";
  // ✅ FIX: setTimeout para que el canvas sea visible antes de que Chart.js lo dibuje
  setTimeout(() => updateAll(), 50);
}

function selectMonth(mes, btn) {
  if (btn.classList.contains("sin-datos")) return;
  currentMes = mes;
  document.querySelectorAll(".month-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  updateAll();
}

// ===== GRÁFICOS ALM MP =====

let chartResina = null;
function dibujarResina() {
  const datos = filtrar(RAW.resina, "FECHA");

  const porArticulo = {};
  datos.forEach(r => {
    const art = r["ARTÍCULO"] || "";
    const stock = parseFloat(r["STOCK ACTUAL"]) || 0;
    const bigbag = parseFloat(r["BIG BAG"]) || 0;
    if (!porArticulo[art]) porArticulo[art] = { stock: 0, bigbag: 0 };
    porArticulo[art].stock += stock;
    porArticulo[art].bigbag += bigbag;
  });

  const labels = Object.keys(porArticulo);
  const stocks = labels.map(l => porArticulo[l].stock);
  const bigbags = labels.map(l => porArticulo[l].bigbag);

  if (chartResina) { chartResina.destroy(); chartResina = null; }

  const ctx = document.getElementById("ch-resina").getContext("2d");
  chartResina = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "STOCK ACTUAL (KG)",
          data: stocks,
          borderColor: "#1565c0",
          backgroundColor: "rgba(21,101,192,0.12)",
          fill: true, tension: 0.3, pointRadius: 5, pointBackgroundColor: "#1565c0"
        },
        {
          label: "BIG BAG (BOL)",
          data: bigbags,
          borderColor: "#90caf9",
          backgroundColor: "rgba(144,202,249,0.08)",
          fill: true, tension: 0.3, pointRadius: 5, pointBackgroundColor: "#90caf9",
          yAxisID: "y2"
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#333", font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: "#555", maxRotation: 45, font: { size: 9 } }, grid: { color: "#f0f0f0" } },
        y: { ticks: { color: "#555" }, grid: { color: "#f0f0f0" }, title: { display: true, text: "KG", color: "#555", font: { size: 10 } } },
        y2: { position: "right", ticks: { color: "#90caf9" }, grid: { display: false }, title: { display: true, text: "BOL", color: "#90caf9", font: { size: 10 } } }
      }
    }
  });
}

let chartResinaCliente = null;
function dibujarResinaCliente() {
  const datos = filtrar(RAW.resina, "FECHA");

  const porDestino = {};
  datos.forEach(r => {
    const destino = r["DESTINO"] || "SIN DESTINO";
    const stock = parseFloat(r["STOCK ACTUAL"]) || 0;
    if (!porDestino[destino]) porDestino[destino] = 0;
    porDestino[destino] += stock;
  });

  const labels = Object.keys(porDestino);
  const valores = labels.map(l => porDestino[l]);
  const total = valores.reduce((a, b) => a + b, 0);

  if (chartResinaCliente) { chartResinaCliente.destroy(); chartResinaCliente = null; }

  const ctx = document.getElementById("ch-resina-cliente").getContext("2d");
  chartResinaCliente = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{ data: valores, backgroundColor: ["#1565c0", "#1a237e", "#42a5f5"], borderColor: "#fff", borderWidth: 3 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: "right", labels: { color: "#333", font: { size: 11 }, padding: 12 } },
        tooltip: { callbacks: { label: (c) => ` ${c.label}: ${(c.raw / total * 100).toFixed(1)}%` } }
      }
    }
  });
}

let chartStockMat = null;
function dibujarStockMaterial() {
  const datos = filtrar(RAW.mp_alm, "FECHA");

  const porDesc = {};
  datos.forEach(r => {
    const desc = r["DESCRIPCIÓN"] || "";
    const stock = parseFloat(r["STOCK ACTUAL"]) || 0;
    if (!porDesc[desc]) porDesc[desc] = 0;
    porDesc[desc] += stock;
  });

  const sorted = Object.entries(porDesc).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const labels = sorted.map(e => e[0].length > 25 ? e[0].substring(0, 25) + "..." : e[0]);
  const valores = sorted.map(e => e[1]);

  if (chartStockMat) { chartStockMat.destroy(); chartStockMat = null; }

  const ctx = document.getElementById("ch-stock-mat").getContext("2d");
  chartStockMat = new Chart(ctx, {
    type: "bar",
    data: { labels, datasets: [{ data: valores, backgroundColor: "#1565c0", borderRadius: 3 }] },
    options: {
      indexAxis: "y", responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          type: "logarithmic",
          ticks: { 
            color: "#555", 
            font: { size: 9 },
            callback: (v) => v >= 1000 ? Math.round(v/1000)+"k" : v
          },
          grid: { color: "#f0f0f0" }
        },
        y: {
          ticks: { color: "#555", font: { size: 9 } },
          grid: { display: false }
        }
      }
    }
  });
}

let chartResinaProd = null;
function dibujarResinaProd() {
  const datos = filtrar(RAW.mp_prod, "FECHA")
    .filter(r => (r["DESCRIPCIÓN"] || "").toUpperCase().includes("RESINA"));

  const porDesc = {};
  datos.forEach(r => {
    const desc = r["DESCRIPCIÓN"] || "";
    const cantidad = parseFloat(r["CANTIDAD"]) || 0;
    const bigbag = Math.round(cantidad / 1100);
    if (!porDesc[desc]) porDesc[desc] = { cantidad: 0, bigbag: 0 };
    porDesc[desc].cantidad += cantidad;
    porDesc[desc].bigbag += bigbag;
  });

  const sorted = Object.entries(porDesc).sort((a, b) => b[1].cantidad - a[1].cantidad);
  const labels = sorted.map(e => e[0].length > 20 ? e[0].substring(0, 20) + "..." : e[0]);
  const cantidades = sorted.map(e => e[1].cantidad);
  const bigbags = sorted.map(e => e[1].bigbag);

  if (chartResinaProd) { chartResinaProd.destroy(); chartResinaProd = null; }

  const ctx = document.getElementById("ch-resina-prod").getContext("2d");

let chartMatProd = null;
function dibujarMatProd() {
  const datos = filtrar(RAW.mp_prod, "FECHA")
    .filter(r => !(r["DESCRIPCIÓN"] || "").toUpperCase().includes("RESINA"));

  const porDesc = {};
  datos.forEach(r => {

function dibujarStockSeg() {
  const datos = RAW.stock_seg;

  const filaStock = datos.find(r =>
    (r["MES"] || "").toUpperCase().includes("STOK") ||
    (r["MES"] || "").toUpperCase().includes("STOCK DE SEG")
  );
  const filaReorden = datos.find(r =>

  );

  const valoresStock   = materiales.map(m => Math.round(parseFloat(filaStock?.[m])   || 0));

  tbody.innerHTML = `

}

let chartPreformas = null;

function dibujarPreformas() {
  const datos = filtrar(RAW.producto, "FECHA");

  // Agrupar STOCK ACTUAL por PRODUCTO (EMBOL / EMPACAR)
  const porProducto = { "EMBOL": 0, "EMPACAR": 0 };
  
  datos.forEach(r => {
    const prod = (r["PRODUCTO"] || "").trim().toUpperCase();
    // Limpiar número con comas de miles: "378,000" → 378000
    const stockStr = (r["STOCK ACTUAL"] || "0").replace(/,/g, "");
    const stock = parseFloat(stockStr) || 0;
    if (prod === "EMBOL") porProducto["EMBOL"] += stock;
    else if (prod === "EMPACAR") porProducto["EMPACAR"] += stock;
  });

  const labels = Object.keys(porProducto);
  const valores = labels.map(l => porProducto[l]);
  const total = valores.reduce((a, b) => a + b, 0);

  if (chartPreformas) { chartPreformas.destroy(); chartPreformas = null; }

  const ctx = document.getElementById("ch-preformas").getContext("2d");
  chartPreformas = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data: valores,
        backgroundColor: ["#42a5f5", "#1565c0"],
        borderColor: "#fff",
        borderWidth: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: "right",
          labels: { color: "#333", font: { size: 11 }, padding: 12 }
        },
        tooltip: {
          callbacks: {
            label: (c) => {
              const pct = (c.raw / total * 100).toFixed(1);
              const mill = (c.raw / 1000000).toFixed(3);
              return ` ${c.label}: ${mill} mill. (${pct}%)`;
            }
          }
        }
      }
    }
  });
}
let chartGauge = null;

function dibujarOTIF() {
  const datos = filtrar(RAW.despachos, "FECHA");

  const total = datos.length;
  if (!total) return;

  const aT = datos.filter(r => 
    (r["ENTREGADO A TIEMPO?"] || "").trim().toUpperCase() === "SI"
  ).length;

  const conf = datos.filter(r => 
    (r["ENTREGADO COMPLETO Y SIN DAÑO?"] || "").trim().toUpperCase() === "SI"
  ).length;

  const pctAT   = aT / total;
  const pctConf = conf / total;
  const otif    = pctAT * pctConf;

  // Actualizar KPIs
  document.getElementById("kpi-at").textContent   = (pctAT * 100).toFixed(1) + "%";
  document.getElementById("kpi-conf").textContent = (pctConf * 100).toFixed(1) + "%";
  document.getElementById("otif-valor").textContent = (otif * 100).toFixed(1) + "%";

  // Color según meta 90%
  const color = otif >= 0.90 ? "#4caf50" : "#f44336";
  document.getElementById("otif-valor").style.color = color;

  // Gauge
  if (chartGauge) { chartGauge.destroy(); chartGauge = null; }

  const ctx = document.getElementById("ch-gauge").getContext("2d");
  chartGauge = new Chart(ctx, {
    type: "doughnut",
    data: {
      datasets: [
        {
          data: [otif, 1 - otif],
          backgroundColor: [color, "#f0f0f0"],
          borderWidth: 0,
          circumference: 180,
          rotation: 270
        },
        {
          data: [0.90, 0.10],
          backgroundColor: ["transparent", "transparent"],
          borderWidth: 0,
          circumference: 180,
          rotation: 270
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: "70%",
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
  });
}

let chartDespLP = null;

function dibujarDespLP() {
  // Filtrar por mes, destino LA PAZ, excluyendo EMBOL y EMPACAR
  const datos = filtrar(RAW.despachos, "FECHA")
    .filter(r => {
      const destino = (r["DESTINO"] || "").trim().toUpperCase();
      const cliente = (r["CLIENTE"] || "").trim().toUpperCase();
      return destino === "LA PAZ" 
        && !cliente.includes("EMBOL") 
        && !cliente.includes("EMPACAR");
    });

  // DISTINCTCOUNT de NRO PEDIDO por CLIENTE
  const porCliente = {};
  datos.forEach(r => {
    const cliente = (r["CLIENTE"] || "").trim();
    const pedido = (r["NRO PEDIDO"] || "").trim();
    if (!cliente || !pedido) return;
    if (!porCliente[cliente]) porCliente[cliente] = new Set();
    porCliente[cliente].add(pedido);
  });

  // Ordenar de mayor a menor
  const sorted = Object.entries(porCliente)
    .map(([k, v]) => ({ cliente: k, pedidos: v.size }))
    .sort((a, b) => b.pedidos - a.pedidos);

  const labels = sorted.map(e => 
    e.cliente.length > 18 ? e.cliente.substring(0, 18) + "..." : e.cliente
  );
  const valores = sorted.map(e => e.pedidos);

  const colores = [
    "#1565c0","#1976d2","#1e88e5","#42a5f5","#64b5f6",
    "#90caf9","#0d47a1","#1a237e","#2196f3","#bbdefb"
  ];

  if (chartDespLP) { chartDespLP.destroy(); chartDespLP = null; }

  const ctx = document.getElementById("ch-desp-lp").getContext("2d");
  chartDespLP = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: sorted.map((e, i) => ({
        label: e.cliente.length > 18 ? e.cliente.substring(0, 18) + "..." : e.cliente,
        data: labels.map((_, j) => j === i ? e.pedidos : 0),
        backgroundColor: colores[i % colores.length],
        borderRadius: 3
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: "right",
          labels: { color: "#333", font: { size: 9 }, padding: 8 }
        },
        tooltip: {
          callbacks: {
            label: (c) => c.raw > 0 ? ` ${c.dataset.label}: ${c.raw}` : null
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          ticks: { color: "#555", font: { size: 9 } },
          grid: { color: "#f0f0f0" }
        },
        y: {
          stacked: true,
          ticks: { color: "#555" },
          grid: { color: "#f0f0f0" }
        }
      }
    }
  });
}
