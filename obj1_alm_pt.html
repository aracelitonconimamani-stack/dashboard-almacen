// ===== UTILIDADES =====
async function fetchCSV(url) {
  const res = await fetch(url);
  const text = await res.text();

  function parseCSVLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQuotes = !inQuotes; }
      else if (line[i] === "," && !inQuotes) { result.push(current.trim()); current = ""; }
      else { current += line[i]; }
    }
    result.push(current.trim());
    return result;
  }

  const lines = text.trim().split("\n");
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const values = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (values[i] || "").trim());
    return obj;
  });
}

function getMes(fechaStr) {
  if (!fechaStr) return "";
  const meses = ["enero","febrero","marzo","abril","mayo","junio",
                 "julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const partes = fechaStr.split("/");
  const mes = parseInt(partes[1]) - 1;
  return meses[mes] || "";
}

function filtrar(arr, campoFecha = "FECHA") {
  if (currentMes === "todos") return arr;
  return arr.filter(r => getMes(r[campoFecha]) === currentMes);
}

function selectMonth(mes, btn) {
  if (btn.classList.contains("sin-datos")) return;

}

// ===== GRÁFICOS =====
let chartGauge = null;
function dibujarOTIF() {
  const datos = filtrar(RAW_DESPACHOS, "FECHA");
  const total = datos.length;
  if (!total) return;

  const aT   = datos.filter(r => (r["ENTREGADO A TIEMPO?"]||"").trim().toUpperCase() === "SI").length;
  const conf = datos.filter(r => (r["ENTREGADO COMPLETO Y SIN DAÑO?"]||"").trim().toUpperCase() === "SI").length;

  const pctAT   = aT / total;
  const pctConf = conf / total;
  const otif    = pctAT * pctConf;

  const colorAT   = pctAT   >= 0.95 ? "#4caf50" : "#f44336";
  const colorConf = pctConf >= 0.85 ? "#4caf50" : "#f44336";
  const colorOTIF = otif    >= 0.90 ? "#4caf50" : "#f44336";

  document.getElementById("kpi-at").textContent   = (pctAT * 100).toFixed(1) + "%";
  document.getElementById("kpi-at").style.color   = colorAT;
  document.getElementById("kpi-conf").textContent = (pctConf * 100).toFixed(1) + "%";
  document.getElementById("kpi-conf").style.color = colorConf;
  document.getElementById("otif-valor").textContent = (otif * 100).toFixed(1) + "%";
  document.getElementById("otif-valor").style.color = colorOTIF;

  if (chartGauge) { chartGauge.destroy(); chartGauge = null; }
  const ctx = document.getElementById("ch-gauge").getContext("2d");
  chartGauge = new Chart(ctx, {
    type: "doughnut",
    data: {
      datasets: [{
        data: [otif, 1 - otif],
        backgroundColor: [colorOTIF, "#f0f0f0"],
        borderWidth: 0,
        circumference: 180,
        rotation: 270
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: "70%",
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
  });
}

let chartDestino = null;
function dibujarDestino() {
  const datos = filtrar(RAW_DESPACHOS, "FECHA");
  const porDestino = {};
  datos.forEach(r => {
    const dest   = (r["DESTINO"]||"").trim();
    const pedido = (r["NRO PEDIDO"]||"").trim();
    if (!dest || !pedido) return;
    if (!porDestino[dest]) porDestino[dest] = new Set();
    porDestino[dest].add(pedido);
  });

  const labels = Object.keys(porDestino);
  const valores = labels.map(l => porDestino[l].size);
  const total = valores.reduce((a, b) => a + b, 0);

  const getDesp = (dest) => {
    const key = Object.keys(porDestino).find(k => k.toUpperCase().includes(dest));
    return key ? porDestino[key].size : 0;
  };

  document.getElementById("kpi-dest-total").textContent   = total;
  document.getElementById("kpi-dest-cbba").textContent    = getDesp("COCHABAMBA");
  document.getElementById("kpi-dest-lp").textContent      = getDesp("LA PAZ");
  document.getElementById("kpi-dest-sc").textContent      = getDesp("SANTA CRUZ");
  document.getElementById("kpi-dest-tarija").textContent  = getDesp("TARIJA");

  if (chartDestino) { chartDestino.destroy(); chartDestino = null; }
  const ctx = document.getElementById("ch-destino").getContext("2d");
  chartDestino = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{ data: valores, backgroundColor: ["#1565c0","#42a5f5","#1976d2","#90caf9","#0d47a1"], borderColor: "#fff", borderWidth: 3 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: "right", labels: { color: "#333", font: { size: 10 }, padding: 10 } },
        tooltip: { callbacks: { label: (c) => ` ${c.label}: ${c.raw} (${(c.raw/total*100).toFixed(1)}%)` } }
      }
    }
  });
}

  datos.forEach(r => {
    const cliente = (r["CLIENTE"]||"").trim();
    const pedido  = (r["NRO PEDIDO"]||"").trim();
    if (!cliente || !pedido) return;
    if (!porCliente[cliente]) porCliente[cliente] = new Set();
    porCliente[cliente].add(pedido);
  });

  const sorted = Object.entries(porCliente)
    .map(([k, v]) => ({ cliente: k, pedidos: v.size }))
    .sort((a, b) => b.pedidos - a.pedidos);

  const labels = sorted.map(e => e.cliente.length > 18 ? e.cliente.substring(0, 18) + "..." : e.cliente);
  const colores = ["#1565c0","#1976d2","#1e88e5","#42a5f5","#64b5f6","#90caf9","#0d47a1","#1a237e","#2196f3","#bbdefb"];

  if (chartDespLP) { chartDespLP.destroy(); chartDespLP = null; }
  const ctx = document.getElementById("ch-desp-lp").getContext("2d");
  chartDespLP = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: sorted.map((e, i) => ({
        label: e.cliente.length > 18 ? e.cliente.substring(0, 18) + "..." : e.cliente,
        data: labels.map((_, j) => j === i ? e.pedidos : 0),
        backgroundColor: colores[i % colores.length],
        borderRadius: 3
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: "right", labels: { color: "#333", font: { size: 9 }, padding: 8 } },
        tooltip: { callbacks: { label: (c) => c.raw > 0 ? ` ${c.dataset.label}: ${c.raw}` : null } }
      },
      scales: {
        x: { stacked: true, ticks: { color: "#555", font: { size: 9 } }, grid: { color: "#f0f0f0" } },
        y: { stacked: true, ticks: { color: "#555" }, grid: { color: "#f0f0f0" } }
      }
    }
  });
}

// ===== ARRANCAR =====
cargarDatos();
</script>
